  <line x1="70" y1="90" x2="40" y2="85" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
  <line x1="70" y1="94" x2="40" y2="94" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
  <line x1="70" y1="98" x2="40" y2="103" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="90" x2="160" y2="85" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="94" x2="160" y2="94" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="98" x2="160" y2="103" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
</svg>
