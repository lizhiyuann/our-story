  <ellipse cx="100" cy="95" rx="28" ry="22" fill="url(#chest)" opacity="0.6"/>
  <!-- 耳朵 -->
  <path d="M70 60 L55 20 L85 50 Z" fill="#D4A55A"/>
  <path d="M72 52 L62 28 L82 48 Z" fill="#FFB6C1" opacity="0.4"/>
  <path d="M130 60 L145 20 L115 50 Z" fill="#D4A55A"/>
  <path d="M128 52 L138 28 L118 48 Z" fill="#FFB6C1" opacity="0.4"/>
  <!-- 额头条纹 -->
  <path d="M85 55 L88 42 L91 55" stroke="#B8863C" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M95 53 L98 40 L101 53" stroke="#B8863C" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M105 55 L108 42 L111 55" stroke="#B8863C" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- 眼睛 -->
  <ellipse cx="85" cy="80" rx="10" ry="9" fill="#F8F4E8"/>
  <ellipse cx="115" cy="80" rx="10" ry="9" fill="#F8F4E8"/>
  <ellipse cx="85" cy="80" rx="7" ry="8" fill="url(#eye)"/>
  <ellipse cx="115" cy="80" rx="7" ry="8" fill="url(#eye)"/>
  <ellipse cx="85" cy="80" rx="3.5" ry="7" fill="#1A1208"/>
  <ellipse cx="115" cy="80" rx="3.5" ry="7" fill="#1A1208"/>
  <circle cx="88" cy="77" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="118" cy="77" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="83" cy="83" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="113" cy="83" r="1.2" fill="white" opacity="0.5"/>
  <!-- 鼻子 -->
  <path d="M96 92 L100 97 L104 92 Z" fill="#FFB6C1"/>
  <ellipse cx="99" cy="93" rx="2" ry="1" fill="white" opacity="0.4"/>
