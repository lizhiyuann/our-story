<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="fur" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F5DCA0"/>
      <stop offset="50%" stop-color="#E8C878"/>
      <stop offset="100%" stop-color="#C49540"/>
    </radialGradient>
    <radialGradient id="chest" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFF8EE"/>
      <stop offset="100%" stop-color="#F5E6D0"/>
    </radialGradient>
    <radialGradient id="eye" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#8B6B3A"/>
      <stop offset="100%" stop-color="#4A3520"/>
    </radialGradient>
  </defs>
  <!-- 尾巴 -->
  <path d="M60 155 Q35 145 40 128 Q45 115 52 120" stroke="#C49540" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- 身体 -->
  <ellipse cx="100" cy="140" rx="50" ry="35" fill="url(#fur)"/>
  <ellipse cx="100" cy="135" rx="30" ry="22" fill="url(#chest)" opacity="0.7"/>
  <!-- 前腿 -->
  <rect x="70" y="160" width="14" height="28" rx="7" fill="#D4A55A"/>
  <rect x="116" y="160" width="14" height="28" rx="7" fill="#D4A55A"/>
  <ellipse cx="77" cy="187" rx="9" ry="5" fill="#F0E0C8"/>
  <ellipse cx="123" cy="187" rx="9" ry="5" fill="#F0E0C8"/>
  <!-- 后腿 -->
  <ellipse cx="75" cy="170" rx="12" ry="18" fill="#C49540"/>
  <ellipse cx="125" cy="170" rx="12" ry="18" fill="#C49540"/>
  <!-- 头（低头吃东西）-->
  <ellipse cx="100" cy="90" rx="40" ry="33" fill="url(#fur)"/>
  <ellipse cx="100" cy="98" rx="28" ry="20" fill="url(#chest)" opacity="0.6"/>
  <!-- 耳朵 -->
  <path d="M70 65 L58 30 L85 58 Z" fill="#D4A55A"/>
  <path d="M72 58 L64 35 L82 55 Z" fill="#FFB6C1" opacity="0.4"/>
  <path d="M130 65 L142 30 L115 58 Z" fill="#D4A55A"/>
  <path d="M128 58 L136 35 L118 55 Z" fill="#FFB6C1" opacity="0.4"/>
  <!-- 眼睛（向下看）-->
  <ellipse cx="85" cy="82" rx="9" ry="8" fill="#F8F4E8"/>
  <ellipse cx="115" cy="82" rx="9" ry="8" fill="#F8F4E8"/>
  <ellipse cx="85" cy="84" rx="6" ry="7" fill="url(#eye)"/>
  <ellipse cx="115" cy="84" rx="6" ry="7" fill="url(#eye)"/>
  <ellipse cx="85" cy="85" rx="3" ry="6" fill="#1A1208"/>
  <ellipse cx="115" cy="85" rx="3" ry="6" fill="#1A1208"/>
  <circle cx="87" cy="82" r="2" fill="white" opacity="0.9"/>
  <circle cx="117" cy="82" r="2" fill="white" opacity="0.9"/>
  <!-- 鼻子 -->
  <path d="M96 95 L100 99 L104 95 Z" fill="#FFB6C1"/>
  <!-- 嘴巴（张开吃东西）-->
  <ellipse cx="100" cy="103" rx="6" ry="4" fill="#5A3A2A"/>
  <!-- 胡须 -->
  <line x1="70" y1="95" x2="42" y2="90" stroke="#C4A060" stroke-width="1" opacity="0.35"/>
  <line x1="70" y1="99" x2="42" y2="99" stroke="#C4A060" stroke-width="1" opacity="0.35"/>
  <line x1="130" y1="95" x2="158" y2="90" stroke="#C4A060" stroke-width="1" opacity="0.35"/>
  <line x1="130" y1="99" x2="158" y2="99" stroke="#C4A060" stroke-width="1" opacity="0.35"/>
</svg>
