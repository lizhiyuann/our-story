<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="fur" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F5DCA0"/>
      <stop offset="50%" stop-color="#E8C878"/>
      <stop offset="100%" stop-color="#C49540"/>
    </radialGradient>
    <radialGradient id="chest" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFF8EE"/>
      <stop offset="100%" stop-color="#F5E6D0"/>
    </radialGradient>
  </defs>
  <!-- 尾巴（卷在身边）-->
  <path d="M55 160 Q30 150 35 135 Q40 120 55 130" stroke="#C49540" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- 身体（趴着，更扁）-->
  <ellipse cx="100" cy="150" rx="55" ry="25" fill="url(#fur)"/>
  <ellipse cx="100" cy="148" rx="32" ry="16" fill="url(#chest)" opacity="0.7"/>
  <!-- 前爪伸出 -->
  <ellipse cx="65" cy="168" rx="10" ry="5" fill="#F0E0C8"/>
  <ellipse cx="135" cy="168" rx="10" ry="5" fill="#F0E0C8"/>
  <!-- 头（侧趴）-->
  <ellipse cx="100" cy="110" rx="38" ry="30" fill="url(#fur)"/>
  <ellipse cx="100" cy="118" rx="26" ry="18" fill="url(#chest)" opacity="0.6"/>
  <!-- 耳朵 -->
  <path d="M72 88 L60 55 L88 80 Z" fill="#D4A55A"/>
  <path d="M74 82 L66 60 L85 78 Z" fill="#FFB6C1" opacity="0.4"/>
  <path d="M128 88 L140 55 L112 80 Z" fill="#D4A55A"/>
  <path d="M126 82 L134 60 L115 78 Z" fill="#FFB6C1" opacity="0.4"/>
  <!-- 闭眼 -->
  <path d="M80 105 Q88 110 96 105" stroke="#4A3520" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M104 105 Q112 110 120 105" stroke="#4A3520" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 鼻子 -->
  <path d="M96 115 L100 119 L104 115 Z" fill="#FFB6C1"/>
  <!-- 嘴巴 -->
  <path d="M95 120 Q100 123 105 120" stroke="#8B6B5A" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 胡须 -->
  <line x1="72" y1="112" x2="45" y2="108" stroke="#C4A060" stroke-width="1" opacity="0.35"/>
  <line x1="72" y1="116" x2="45" y2="116" stroke="#C4A060" stroke-width="1" opacity="0.35"/>
  <line x1="128" y1="112" x2="155" y2="108" stroke="#C4A060" stroke-width="1" opacity="0.35"/>
  <line x1="128" y1="116" x2="155" y2="116" stroke="#C4A060" stroke-width="1" opacity="0.35"/>
  <!-- Zzz -->
  <text x="140" y="85" font-size="16" fill="#8B7BA8" opacity="0.6" font-family="sans-serif">Z</text>
  <text x="152" y="72" font-size="12" fill="#8B7BA8" opacity="0.4" font-family="sans-serif">z</text>
  <text x="160" y="62" font-size="10" fill="#8B7BA8" opacity="0.3" font-family="sans-serif">z</text>
</svg>
