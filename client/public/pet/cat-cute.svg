<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="fur" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F5DCA0"/>
      <stop offset="50%" stop-color="#E8C878"/>
      <stop offset="100%" stop-color="#C49540"/>
    </radialGradient>
    <radialGradient id="chest" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFF8EE"/>
      <stop offset="100%" stop-color="#F5E6D0"/>
    </radialGradient>
    <radialGradient id="eye" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#8B6B3A"/>
      <stop offset="100%" stop-color="#4A3520"/>
    </radialGradient>
  </defs>
  <!-- 尾巴（竖起来撒娇）-->
  <path d="M60 150 Q40 120 45 90 Q50 70 55 80" stroke="#C49540" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- 身体 -->
  <ellipse cx="100" cy="140" rx="50" ry="35" fill="url(#fur)"/>
  <ellipse cx="100" cy="135" rx="30" ry="22" fill="url(#chest)" opacity="0.7"/>
  <!-- 前腿（站立）-->
  <rect x="70" y="160" width="14" height="28" rx="7" fill="#D4A55A"/>
  <rect x="116" y="160" width="14" height="28" rx="7" fill="#D4A55A"/>
  <ellipse cx="77" cy="187" rx="9" ry="5" fill="#F0E0C8"/>
  <ellipse cx="123" cy="187" rx="9" ry="5" fill="#F0E0C8"/>
  <!-- 后腿 -->
  <ellipse cx="75" cy="170" rx="12" ry="18" fill="#C49540"/>
  <ellipse cx="125" cy="170" rx="12" ry="18" fill="#C49540"/>
  <!-- 头（微微歪头）-->
  <ellipse cx="100" cy="85" rx="40" ry="35" fill="url(#fur)" transform="rotate(-5,100,85)"/>
  <ellipse cx="100" cy="95" rx="28" ry="22" fill="url(#chest)" opacity="0.6"/>
  <!-- 耳朵 -->
  <path d="M68 60 L55 22 L85 52 Z" fill="#D4A55A"/>
  <path d="M70 54 L62 28 L82 50 Z" fill="#FFB6C1" opacity="0.4"/>
  <path d="M132 60 L148 22 L118 52 Z" fill="#D4A55A"/>
  <path d="M130 54 L142 28 L122 50 Z" fill="#FFB6C1" opacity="0.4"/>
  <!-- 眼睛（大大的，撒娇眼神）-->
  <ellipse cx="85" cy="80" rx="11" ry="10" fill="#F8F4E8"/>
  <ellipse cx="115" cy="80" rx="11" ry="10" fill="#F8F4E8"/>
  <ellipse cx="85" cy="80" rx="8" ry="9" fill="url(#eye)"/>
  <ellipse cx="115" cy="80" rx="8" ry="9" fill="url(#eye)"/>
  <ellipse cx="85" cy="80" rx="4" ry="8" fill="#1A1208"/>
  <ellipse cx="115" cy="80" rx="4" ry="8" fill="#1A1208"/>
  <circle cx="88" cy="76" r="3" fill="white" opacity="0.95"/>
  <circle cx="118" cy="76" r="3" fill="white" opacity="0.95"/>
  <circle cx="83" cy="83" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="113" cy="83" r="1.5" fill="white" opacity="0.5"/>
  <!-- 鼻子 -->
  <path d="M96 93 L100 97 L104 93 Z" fill="#FFB6C1"/>
  <ellipse cx="99" cy="94" rx="2" ry="1" fill="white" opacity="0.4"/>
  <!-- 嘴巴（微笑）-->
  <path d="M92 99 Q100 106 108 99" stroke="#8B6B5A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- 脸颊红晕 -->
  <ellipse cx="75" cy="90" rx="8" ry="5" fill="#FFB6C1" opacity="0.25"/>
  <ellipse cx="125" cy="90" rx="8" ry="5" fill="#FFB6C1" opacity="0.25"/>
  <!-- 胡须 -->
  <line x1="68" y1="90" x2="38" y2="85" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
  <line x1="68" y1="94" x2="38" y2="94" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
  <line x1="68" y1="98" x2="38" y2="103" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
  <line x1="132" y1="90" x2="162" y2="85" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
  <line x1="132" y1="94" x2="162" y2="94" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
  <line x1="132" y1="98" x2="162" y2="103" stroke="#C4A060" stroke-width="1" opacity="0.4"/>
</svg>
