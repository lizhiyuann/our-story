services:
  # ─── PostgreSQL 数据库 ─────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: love
      POSTGRES_PASSWORD: love_secret
      POSTGRES_DB: love_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U love -d love_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── AI Agent 服务 (Python + LangGraph) ────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://server:3001
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - chroma_data:/app/chroma_data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── 后端 API 服务 (Node.js + Fastify) ────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://love:love_secret@db:5432/love_db
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - uploads:/app/uploads
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── 前端 (React + Vite) ──────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"

  # ─── Nginx 反向代理 (统一入口) ─────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - server
      - client
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/uploads:ro

volumes:
  pgdata:
  uploads:
  chroma_data:
